[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate && rm -rf .next node_modules/.cache && DATABASE_URL=postgresql://placeholder/placeholder npm run build"

[deploy]
startCommand = "npx prisma db push --accept-data-loss && node server.js"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "tabende-marketplace"
